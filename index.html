<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Lexend:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Buscador Pokémon</h1>
    <form action="" id="pokeForm">
        <input type="text" id="pokeInput">
        <button type="submit" class="pageBtn">SEARCH</button>
        
    </form>
    <hr>
    <div id="mainContainer"></div>
    <div class="bottomBar">
        <div id="controls">
            <button id="prev" class="pageBtn">Previous</button>
            <div id="page"> Page 1 </div>
            <button id="next" class="pageBtn">Next</button>
        </div>
    </div>
    <div class="hidden" id="overlay">
        <div id="sidePanel">
            <div id="sidePanelInfo">
                <button class="exitSidePanel" onclick="exitSidePanel()">X</button>
                <div id="pokeProfile">
                    <div class="pokeProfileImgDiv">
                        <img id="pokeProfileImg"></img>
                        <img src="shinySparkleVfx.gif" class="hidden" id="shinyVfx">
                        <img src="loading.png" alt="" class="hidden" id="loadingSpinner">
                    </div>

                    <div class="nameId">
                        <DIV>
                            <div id="pokeProfileName"></div>
                            <div id="pokeProfileId"></div>
                        </DIV>
                        <div>
                            <button class="pageBtn" id="shinyBtn">✨</button>
                            <button class="pageBtn" id="cryBtn">🔊</button>
                        </div>
                    </div>

                    <div id="pokeProfileTypeDiv" >

                    </div>

                </div>
                <div id="pokeStats">
                    <div class="hpDiv">
                        <div class="statDiv">
                            <div>HP</div>
                            <div id="hp">??</div>
                        </div>
                        <div class="statBarDiv">
                            <div>
                            </div>
                        </div>
                    </div>
                    <div class="atkDiv">
                        <div class="statDiv">
                            <div>Attack</div>
                            <div id="atk">??</div>
                        </div>
                        <div class="statBarDiv">
                            <div>
                            </div>
                        </div>
                    </div>
                    <div class="defDiv">
                        <div class="statDiv">
                            <div>Defense</div>
                            <div id="def">??</div>
                        </div>
                        <div class="statBarDiv">
                            <div>
                            </div>
                        </div>
                    </div>
                    <div class="spaDiv">
                        <div class="statDiv">
                            <div>Sp. Attack</div>
                            <div id="spa">??</div>
                        </div>
                        <div class="statBarDiv">
                            <div>
                            </div>
                        </div>
                    </div>
                    <div class="spdDiv">
                        <div class="statDiv">
                            <div>Sp. Defense</div>
                            <div id="spd">??</div>
                        </div>
                        
                        <div class="statBarDiv">
                            <div>

                            </div>
                        </div>
                    </div>
                    <div class="speDiv">
                        <div class="statDiv">
                            <div>Speed</div>
                            <div id="spe">??</div>
                        </div>
                        <div class="statBarDiv">
                            <div>

                            </div>
                        </div>
                    </div>
                </div>
                <div id="pokeEffectiveness">
                    <span class="aa">Type Effectiveness</span>
                    <div id="typeEfectivenessContainer">
                        <div class="effectivenessDiv">
                            <span class="efectivenessIndicator">x4 Damage From</span>
                            <div id="quadruple" class="pokeTypeDiv typeEffectiveness"></div>
                        </div>

                        <div class="effectivenessDiv">
                            <span class="efectivenessIndicator">x2 Damage From</span>
                            <div id="double" class="pokeTypeDiv typeEffectiveness"></div>
                        </div>

                        <div class="effectivenessDiv">
                            <span class="efectivenessIndicator">1x Damage From</span>
                            <div id="single" class="pokeTypeDiv typeEffectiveness"></div>
                        </div>

                        <div class="effectivenessDiv">
                            <span class="efectivenessIndicator">0.5x Damage From</span>
                            <div id="half" class="pokeTypeDiv typeEffectiveness"></div>
                        </div>

                        <div class="effectivenessDiv">
                            <span class="efectivenessIndicator">0.25x Damage From</span>
                            <div id="quarter" class="pokeTypeDiv typeEffectiveness"></div>
                        </div>

                        <div class="effectivenessDiv">
                            <span class="efectivenessIndicator">Inmune to</span>
                            <div id="inmune" class="pokeTypeDiv typeEffectiveness"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
<script src="js.js"></script>
</html>
